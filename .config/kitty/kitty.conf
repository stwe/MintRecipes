# --- Schrift ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- Farben & Transparenz ---
# WEICHERER HINTERGRUND statt Tiefschwarz
background #1A1B26
foreground #A9B1D6

# TRANSPARENZ (Glas-Effekt)
# Stelle sicher, dass du in Mint Cinnamon bist!
background_opacity 0.85
dynamic_background_opacity yes

# ANSI Farbpalette (Ein modernes Farbschema, z.B. Tokyo Night)
# Schwarz
color0 #1A1B26
color8 #414868
# Rot
color1 #F7768E
color9 #F7768E
# Grün
color2  #9ECE6A
color10 #9ECE6A
# Gelb
color3  #E0AF68
color11 #E0AF68
# Blau
color4  #7AA2F7
color11 #7AA2F7
# Magenta
color5  #BB9AF7
color13 #BB9AF7
# Cyan
color6  #7DCFFF
color14 #7DCFFF
# Weiß
color7  #A9B1D6
color15 #C0CAF5

# --- Optik ---
# Entfernt die dicke Titelleiste
#hide_window_decorations yes
# Abstände zum Rand (damit der Text nicht am Rand klebt)
window_padding_width 4
# Abgerundete Ecken (funktioniert nur, wenn der Fenstermanager es erlaubt)
window_border_radius 10

# --- Cursor ---
cursor_shape beam
cursor_blink_interval 0.5

# --- Tabs ---
tab_bar_style powerline
active_tab_foreground   #1A1B26
active_tab_background   #7AA2F7
inactive_tab_foreground #A9B1D6
inactive_tab_background #292E42
